name: Deploy to GitHub Pages

# Publishes the built app to the gh-pages branch. GitHub serves that branch at
# https://sleepingesram-dev.github.io/macro-recorder/ and enables Pages
# automatically when the branch first appears — no Pages API calls, which the
# default workflow token is not allowed to make on this repo.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: /macro-recorder/
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
